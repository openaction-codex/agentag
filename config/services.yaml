# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\AgentTag\Configuration\AgentTagSettings:
        arguments:
            $tag: '%env(string:AGENTAG_TAG)%'
            $workspacePath: '%env(resolve:AGENTAG_WORKSPACE_PATH)%'
            $runTimeoutSeconds: '%env(int:AGENTAG_RUN_TIMEOUT_SECONDS)%'
            $modelSelectionModel: '%env(string:AGENTAG_MODEL_SELECTION_MODEL)%'
            $modelSelectionTimeoutSeconds: '%env(int:AGENTAG_MODEL_SELECTION_TIMEOUT_SECONDS)%'
            $taskDeadlineSeconds: '%env(int:AGENTAG_TASK_DEADLINE_SECONDS)%'
            $maxRetries: '%env(int:AGENTAG_MAX_RETRIES)%'
            $retryDelaySeconds: '%env(int:AGENTAG_RETRY_DELAY_SECONDS)%'
            $notificationPreference: '%env(string:AGENTAG_NOTIFICATION_PREFERENCE)%'

    App\AgentTag\Security\SensitiveTextRedactor:
        arguments:
            $customPatterns: '%env(string:AGENTAG_REDACTION_PATTERNS)%'

    App\AgentTag\Mattermost\TaskCardRenderer:
        arguments:
            $appSecret: '%env(string:APP_SECRET)%'

    App\AgentTag\Workspace\WorkspaceLayout:
        arguments:
            $workspacePath: '%env(resolve:AGENTAG_WORKSPACE_PATH)%'

    App\AgentTag\Mattermost\MattermostWebhookAuthenticator:
        arguments:
            $expectedToken: '%env(string:MATTERMOST_WEBHOOK_TOKEN)%'

    App\AgentTag\Mattermost\MattermostNotifier:
        alias: App\AgentTag\Mattermost\MattermostApiNotifier

    App\AgentTag\Mattermost\MattermostInputFileDownloader:
        alias: App\AgentTag\Mattermost\MattermostApiInputFileDownloader

    App\AgentTag\Runner\TaskModelSelector:
        alias: App\AgentTag\Runner\CodexTaskModelSelector

    App\AgentTag\Chat\InboundEventIdempotencyStore:
        alias: App\AgentTag\Chat\DoctrineInboundEventIdempotencyStore

    App\AgentTag\Session\ChatSessionStore:
        alias: App\AgentTag\Session\DoctrineChatSessionStore

    App\AgentTag\Workspace\WorkspaceRevisionResolver:
        alias: App\AgentTag\Workspace\GitWorkspaceRevisionResolver

    App\AgentTag\Run\RunInterrupter:
        alias: App\AgentTag\Run\AgentRunInterrupter

    App\AgentTag\Agent\AgentProfileProvider:
        alias: App\AgentTag\Agent\WorkspaceAgentProfileProvider

    App\AgentTag\Runner\ProcessFactory:
        alias: App\AgentTag\Runner\SymfonyProcessFactory

    App\AgentTag\Runner\SymfonyProcessFactory:
        arguments:
            $githubPatToken: '%env(string:GITHUB_PAT_TOKEN)%'

    App\AgentTag\Runner\AgentRunnerInterface:
        alias: App\AgentTag\Runner\CodexCliRunner

    App\AgentTag\Session\SessionContextSnapshotBuilder:
        arguments:
            $maxCharacters: '%env(int:AGENTAG_CONTEXT_MAX_CHARS)%'

    App\AgentTag\Mattermost\MattermostApiSettings:
        arguments:
            $baseUrl: '%env(string:MATTERMOST_BASE_URL)%'
            $botToken: '%env(string:MATTERMOST_BOT_TOKEN)%'
            $recentReplyLimit: '%env(int:MATTERMOST_RECENT_REPLY_LIMIT)%'

    App\AgentTag\Mattermost\MattermostThreadContextProvider:
        alias: App\AgentTag\Mattermost\MattermostApiThreadContextProvider

    App\AgentTag\Mattermost\MattermostThreadRootResolver:
        alias: App\AgentTag\Mattermost\MattermostApiThreadRootResolver
