; Install to /etc/php/8.4/fpm/pool.d/agentag.conf.
; This keeps web requests under www-data. The Messenger worker can still run as
; root so Codex executes as root on the host.

[agentag]
user = www-data
group = www-data

listen = /run/php/agentag-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
listen.backlog = 128

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

chdir = /srv/agentag/app

access.log = /var/log/php8.4-fpm-agentag.access.log
access.format = "%R - %u %t \"%m %r%Q%q\" %s %{mili}dms %{kilo}Mkb %C%%"

slowlog = /var/log/php8.4-fpm-agentag.slow.log
request_slowlog_timeout = 10s
request_slowlog_trace_depth = 20
request_terminate_timeout = 90s
request_terminate_timeout_track_finished = yes

catch_workers_output = yes
decorate_workers_output = no
clear_env = no

env[APP_ENV] = prod
env[APP_DEBUG] = 0

security.limit_extensions = .php
