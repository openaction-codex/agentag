# Install to /etc/nginx/sites-available/agentag.conf and symlink from sites-enabled.
# Replace agentag.example.com with the real hostname.

log_format agentag_apm '[$time_local] '
                        'host=$host '
                        'client=$remote_addr '
                        'proxy=$http_x_real_ip '
                        'cf_client=$http_cf_connecting_ip '
                        'ray=$http_cf_ray '
                        'method=$request_method '
                        'request="$request" '
                        'request_length=$request_length '
                        'status=$status '
                        'bytes_sent=$bytes_sent '
                        'referer=$http_referer '
                        'user_agent="$http_user_agent" '
                        'upstream_addr=$upstream_addr '
                        'upstream_status=$upstream_status '
                        'request_time=$request_time '
                        'upstream_response_time=$upstream_response_time '
                        'upstream_connect_time=$upstream_connect_time '
                        'upstream_header_time=$upstream_header_time '
                        'app_route=$upstream_http_x_app_route '
                        'app_time=$upstream_http_x_app_time';

upstream agentag_php {
    server unix:/run/php/agentag-fpm.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name agentag.example.com;

    root /srv/agentag/app/public;
    index index.php;
    charset utf-8;

    access_log /var/log/nginx/agentag.access.log agentag_apm;
    error_log /var/log/nginx/agentag.error.log warn;

    server_tokens off;
    client_max_body_size 50M;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # Common noisy probes.
    if ($http_user_agent ~* "WordPress") {
        return 404;
    }

    location ~* (wp\-includes|wp\-content|wp\-login|wp\-admin|wlwmanifest) {
        return 404;
    }

    location ~* /\.env {
        return 404;
    }

    location ~* /\.(git|svn|hg) {
        return 404;
    }

    location ~* /acme-challenge {
        return 404;
    }

    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|webp|ico|eot|otf|ttf|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        try_files $uri /index.php$is_args$args;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php(/|$) {
        internal;

        fastcgi_pass agentag_php;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_read_timeout 90s;

        fastcgi_hide_header X-App-Route;
        fastcgi_hide_header X-App-Time;
        fastcgi_hide_header X-Current-User-Type;
        fastcgi_hide_header X-Current-User-Id;
        fastcgi_hide_header X-Powered-By;
    }
}
