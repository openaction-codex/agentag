name: CI

on:
    push:
    pull_request:

jobs:
    checks:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: agentag_test
                    POSTGRES_USER: agentag
                    POSTGRES_PASSWORD: agentag
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U agentag -d agentag_test"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: ctype, iconv, pdo_pgsql, pdo_sqlite
                  coverage: none

            - name: Validate Composer
              run: composer validate --strict

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Check coding style
              run: composer cs-check

            - name: Run phpstan
              run: composer phpstan

            - name: Run PHPUnit
              run: composer test

            - name: Verify PostgreSQL migrations and mapping
              env:
                  APP_ENV: prod
                  APP_DEBUG: 0
                  DATABASE_URL: postgresql://agentag:agentag@127.0.0.1:5432/agentag_test?serverVersion=16&charset=utf8
              run: |
                  php bin/console doctrine:migrations:migrate --no-interaction
                  php bin/console doctrine:schema:validate
